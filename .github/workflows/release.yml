name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: east
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: east
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: east
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: east
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: east.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.82.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../east-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../east-${{ matrix.target }}.zip ${{ matrix.artifact }}
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: east-${{ matrix.target }}
          path: east-${{ matrix.target }}.*

  # Create a macOS universal binary from the two arch-specific builds
  macos-universal:
    name: macOS Universal Binary
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: east-x86_64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: east-aarch64-apple-darwin

      - name: Create universal binary
        run: |
          tar xzf east-x86_64-apple-darwin.tar.gz
          mv east east-x86_64
          tar xzf east-aarch64-apple-darwin.tar.gz
          mv east east-aarch64
          lipo -create east-x86_64 east-aarch64 -output east
          tar czf east-universal-apple-darwin.tar.gz east

      - uses: actions/upload-artifact@v4
        with:
          name: east-universal-apple-darwin
          path: east-universal-apple-darwin.tar.gz

  release:
    name: GitHub Release
    needs: [build, macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: release/*

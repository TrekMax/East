[package]
name = "east-cli"
version = "0.0.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "CLI entrypoint for east"

[[bin]]
name = "east"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = ">=4.4, <4.5.24", features = ["derive"] }
east-manifest = { path = "../east-manifest" }
east-vcs = { path = "../east-vcs" }
east-workspace = { path = "../east-workspace" }
indicatif = "0.17"
serde_yaml = "0.9"
tempfile = ">=3.10, <3.19"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
assert_cmd = ">=2.0, <2.1"
predicates = ">=3.0, <3.2"
tempfile = ">=3.10, <3.19"
